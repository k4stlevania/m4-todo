<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/styles.css">
    <title>TaskFlow</title>
</head>

<body>
    <div class="container" style="min-width: 90%;">
        <h1 class="text-center p-5">TaskFlow</h1>

        <nav class="navbar navbar-expand-lg ">
            <form id="navbarForm" class="d-flex w-50" role="search">
                <input class="form-control me-2 w-100" type="search" placeholder="Search Task"
                    aria-label="Search Task" />
                <button class="btn btn-outline-warning me-2" type="submit">Search</button>
            </form>
            <button class="btn btn-outline-light" type="submit" data-bs-toggle="modal" data-bs-target="#exampleModal">Add new task</button>
        </nav>

        <!-- New Task Modal -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Add Task</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="newTaskForm">
                            <div>
                                <label for="taskDescription" class="form-label">Add your task:</label>
                                <input type="text" id="taskDescription" name="taskDescription" class="form-control">
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="submit" class="btn btn-primary">Save Task</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="hr"></div>

        <main class="mainContent">
            <div class="showTasks contenido">

            </div>
            <aside class="completedTasks contenido">
                <h3>Completed Tasks</h3>

            </aside>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
