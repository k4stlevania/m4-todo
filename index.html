<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/styles.css">
    <title>TaskFlow</title>
</head>

<body>
    <div class="container" style="min-width: 90%;">
        <h1 class="text-center p-5">TaskFlow</h1>

        <nav class="navbar navbar-expand-lg ">
            <form class="d-flex w-50" role="search">
                <input class="form-control me-2 w-100" type="search" placeholder="Search Task"
                    aria-label="Search Task" />
                <button class="btn btn-outline-info me-2" type="submit">Search</button>
            </form>
            <button class="btn btn-outline-light" type="submit">Add tasks</button>
        </nav>

        <div class="hr"></div>

        <main class="mainContent">
            <div class="showTasks contenido">

                <div class="task"></div>
                <div class="task"></div>
                <div class="task"></div>
                <div class="task"></div>
                <div class="task"></div>
                <div class="task"></div>
                <div class="task"></div>
                <div class="task"></div>
                <div class="task"></div>
                <div class="task"></div>
                <div class="task"></div>
                <div class="task"></div>
            </div>
            <aside class="completedTasks contenido">
                <h3>Completed Tasks</h3>
                <ul>
                    <li>task 1</li>
                    <li>task 2</li>
                    <li>task 3</li>
                    <li>task 4</li>
                    <li>task 5</li>
                    <li>task 6</li>
                </ul>
            </aside>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
